# Self-hosting: run IPEDS Oracle with Docker Compose.
#
#   1. Put ipeds.db (and, for admin re-imports, the source .accdb files) under
#      ./srv-data — see the volume below:
#        srv-data/ipeds.db          the built database
#        srv-data/accdb/*.accdb     source Access files (for admin re-imports)
#   2. Copy .env.example -> .env and fill it in (keys, ADMIN_EMAILS, APP_PUBLIC_URL).
#   3. docker compose up -d --build
#
# The app listens on :8000. For HTTPS either put it behind a reverse proxy or
# tunnel that terminates TLS, or serve TLS directly with a self-signed cert — see
# the README "Self-hosting" section.
#
# Data lives on the host volume, NOT in the image — rebuilds/atomic swaps and app
# state (users, skills, chats) all persist across container restarts.

services:
  app:
    # Pull a CI-built, smoke-tested image from GHCR (`docker compose pull`), pinned
    # via IPEDS_TAG (defaults to :latest). `build:` stays so `docker compose up
    # --build` also builds from source without a registry.
    image: ghcr.io/toddawhittaker/ipeds-oracle:${IPEDS_TAG:-latest}
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      IPEDS_DB_PATH: /data/ipeds.db
      APP_DB_PATH: /data/app.db
      LOG_DB_PATH: /data/logs.db   # persistent server logs (survive restarts)
      DATA_DIR: /data/accdb
      UPLOAD_DIR: /data/uploads
      NCES_WORK_DIR: /data/work  # scratch for the Imports year-catalog fetch; cleaned after every run
      # COOKIE_SECURE and TRUSTED_PROXY_COUNT come from .env — set them to match
      # your ingress (see .env.example).
    volumes:
      - ./srv-data:/data
      # For direct HTTPS with a self-signed cert, also mount your certs here and
      # set SSL_CERTFILE=/certs/cert.pem, SSL_KEYFILE=/certs/key.pem in .env (README).
      # - ./certs:/certs:ro
    ports:
      - "8000:8000"
