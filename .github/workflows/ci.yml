name: CI

# Runs the deterministic, key-free test suites on every PR and every push to
# main, so the security/a11y retrofit stays regression-proof. Nothing here needs
# a live LLM key or the real 1.9 GB ipeds.db:
#   * backend job  — builds a tiny fixture ipeds.db (scripts/make_ci_fixture_db.py)
#                    and runs the SQL-guard, hardening, backend and security suites.
#   * e2e job      — Playwright specs that mock every /api/** call at the network
#                    layer (web/e2e/mocks.js); no backend process is started.
#
# NOT run here: eval/eval_nl2sql.py asserts known-good national totals against the
# real database and needs OPENROUTER_API_KEY. Run it locally against the real
# ipeds.db when swapping models — see eval/ and SCHEMA.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer commit on the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff · eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint + import order)
        run: ruff check app scripts eval

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: ESLint
        run: npm run lint
        working-directory: web

  backend:
    name: Backend suites (guards · hardening · backend · security)
    runs-on: ubuntu-latest
    env:
      # Point the app at a throwaway fixture DB, never the real (absent) one.
      # (runner.temp isn't available in job-level env; github.workspace is. The
      # *.db paths are gitignored, so writing them into the workspace is fine.)
      IPEDS_DB_PATH: ${{ github.workspace }}/.ci/ipeds.db
      APP_DB_PATH: ${{ github.workspace }}/.ci/app.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mdbtools (importer dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mdbtools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Build CI fixture database
        run: python scripts/make_ci_fixture_db.py "$IPEDS_DB_PATH"

      - name: Stub web/dist (activates app/main.py SPA-serving + its traversal guard)
        run: python scripts/make_web_dist_stub.py

      - name: SQL guard tests
        run: python eval/test_sql_guards.py

      - name: SQL guard hardening tests
        run: python eval/test_sql_guards_hardening.py

      - name: Backend tests (auth · admin · skills · cache · CSV)
        run: python eval/test_backend.py

      - name: Security regression tests
        run: python eval/test_security.py

      - name: Auth rate-limit tests
        run: python eval/test_rate_limit.py

      - name: app.db migration tests
        run: python eval/test_migrations.py

      - name: run_sql result isolation tests
        run: python eval/test_result_isolation.py

      - name: app.db backup/restore tests
        run: python eval/test_backup.py

      - name: agent tool-loop tests
        run: python eval/test_agent_loop.py

      - name: log-buffer secret-scrubbing tests
        run: python eval/test_logbuffer.py

      - name: mailer tests (failure handling · admin fan-out)
        run: python eval/test_mailer.py

      - name: guardrail tests (topical gate · injection refusal)
        run: python eval/test_guard.py

      - name: importer tests (preflight · integrity checks · run_import pipeline)
        run: python eval/test_importer.py

      - name: schema discovery-tool tests
        run: python eval/test_schema_tool.py

      - name: tool-registry tests (tool_specs · dispatch error handling)
        run: python eval/test_registry.py

      - name: chat router tests (cache hit · edit/rerun · feedback · CSV errors)
        run: python eval/test_chat_router.py

      - name: admin router tests (import HTTP surface · usage · skills · logs)
        run: python eval/test_admin_router.py

      - name: Coverage gate (app/ >= 80%)
        run: |
          pip install coverage==7.15.1
          scripts/coverage_check.sh

  e2e:
    name: Playwright e2e (network-mocked UI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
