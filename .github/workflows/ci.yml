name: CI

# Runs the deterministic, key-free test suites on every PR and every push to
# main, so the security/a11y retrofit stays regression-proof. Nothing here needs
# a live LLM key or the real 1.9 GB ipeds.db:
#   * backend job  — builds a tiny fixture ipeds.db (scripts/make_ci_fixture_db.py)
#                    and runs the SQL-guard, hardening, backend and security suites.
#   * e2e job      — Playwright specs that mock every /api/** call at the network
#                    layer (frontend/e2e/mocks.js); no backend process is started.
#
# NOT run here: backend/tests/eval_nl2sql.py asserts known-good national totals
# against the real database and needs LLM_API_KEY. Run it locally against the
# real ipeds.db when swapping models — see backend/tests/ and docs/SCHEMA.md.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer commit on the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff · eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Ruff (lint + import order)
        run: ruff check --config backend/pyproject.toml backend/app backend/tests scripts

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

  backend:
    name: Backend suites (guards · hardening · backend · security)
    runs-on: ubuntu-latest
    env:
      # Point the app at a throwaway fixture DB, never the real (absent) one.
      # (runner.temp isn't available in job-level env; github.workspace is. The
      # *.db paths are gitignored, so writing them into the workspace is fine.)
      IPEDS_DB_PATH: ${{ github.workspace }}/.ci/ipeds.db
      APP_DB_PATH: ${{ github.workspace }}/.ci/app.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mdbtools (importer dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mdbtools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.lock

      - name: Build CI fixture database
        run: python scripts/make_ci_fixture_db.py "$IPEDS_DB_PATH"

      - name: Stub frontend/dist (activates backend/app/main.py SPA-serving + its traversal guard)
        run: python scripts/make_web_dist_stub.py

      - name: SQL guard tests
        run: python backend/tests/test_sql_guards.py

      - name: SQL guard hardening tests
        run: python backend/tests/test_sql_guards_hardening.py

      - name: SQL aggregation lint tests (rollup/hang foot-gun checks)
        run: python backend/tests/test_sqllint.py

      - name: Backend tests (auth · admin · skills · cache · CSV)
        run: python backend/tests/test_backend.py

      - name: Security regression tests
        run: python backend/tests/test_security.py

      - name: CSRF Origin-guard tests
        run: python backend/tests/test_csrf.py

      - name: Security-headers (CSP) tests
        run: python backend/tests/test_secheaders.py

      - name: Auth rate-limit tests
        run: python backend/tests/test_rate_limit.py

      - name: EMAIL_DOMAIN access-request gate tests
        run: python backend/tests/test_access_gate.py

      - name: app.db migration tests
        run: python backend/tests/test_migrations.py

      - name: run_sql result isolation tests
        run: python backend/tests/test_result_isolation.py

      - name: app.db backup/restore tests
        run: python backend/tests/test_backup.py

      - name: agent tool-loop tests
        run: python backend/tests/test_agent_loop.py

      - name: shared LLM transport tests (provider-neutral chat_completion)
        run: python backend/tests/test_llmhttp.py

      - name: log-buffer secret-scrubbing tests
        run: python backend/tests/test_logbuffer.py

      - name: mailer tests (failure handling · admin fan-out)
        run: python backend/tests/test_mailer.py

      - name: guardrail tests (topical gate · injection refusal)
        run: python backend/tests/test_guard.py

      - name: critic tests (post-answer review · one-shot revision)
        run: python backend/tests/test_critic.py

      - name: self-learning lesson tests (store · dedup · critic emission)
        run: python backend/tests/test_skills.py

      - name: importer tests (preflight · integrity checks · run_import pipeline)
        run: python backend/tests/test_importer.py

      - name: NCES fetch tests (host-pin · zip-slip/zip-bomb guards · catalog)
        run: python backend/tests/test_nces.py

      - name: schema discovery-tool tests
        run: python backend/tests/test_schema_tool.py

      - name: tool-registry tests (tool_specs · dispatch error handling)
        run: python backend/tests/test_registry.py

      - name: chat router tests (cache hit · edit/rerun · feedback · CSV errors)
        run: python backend/tests/test_chat_router.py

      - name: admin router tests (import HTTP surface · usage · skills · logs)
        run: python backend/tests/test_admin_router.py

      - name: Coverage gate (backend/app/ >= 80%)
        run: |
          pip install coverage==7.15.1
          scripts/coverage_check.sh

  unit:
    name: Web unit tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Runs vitest with coverage; vitest.config.js enforces a per-file >=80%
      # line floor over the pure-logic modules under test (the JS analogue of
      # coverage_check.sh). No browser — jsdom only.
      - name: Run unit tests (with coverage floor)
        run: npm run test:unit

  e2e:
    name: Playwright e2e (network-mocked UI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  image:
    name: Docker image (build · smoke-test · publish)
    runs-on: ubuntu-latest
    # Only build/publish the deployable image once the tests are green, so a
    # broken build or a boot failure can't reach the registry.
    needs: [lint, backend, e2e]
    permissions:
      contents: read
      packages: write   # push to ghcr.io/<owner>/ipeds-ai
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, load into the local daemon, and smoke-test it BEFORE any
      # push. Layers are cached to GHA so the later push step is a cache hit.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ipeds-ai:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container (boots + /api/health)
        run: |
          # No ipeds.db/keys — the app lazily opens the query DB and fails open
          # without an LLM key, so /api/health must answer on a bare boot.
          docker run -d --name smoke -p 8000:8000 \
            -e COOKIE_SECURE=false -e LLM_API_KEY= -e RESEND_API_KEY= \
            ipeds-ai:smoke
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health | grep -q '"ok":true'; then
              echo "health OK"; docker rm -f smoke; exit 0
            fi
            sleep 1
          done
          echo "::error::container did not become healthy"; docker logs smoke; \
            docker rm -f smoke; exit 1

      # Tag scheme: main push -> :edge + :sha-<short>; a v* tag (release) ->
      # :vX.Y.Z + :X.Y + :latest. PRs build+smoke only (no push).
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=false
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image (main + tags only)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
