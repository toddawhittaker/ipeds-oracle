name: NL→SQL eval (manual)

# The full NL→SQL accuracy gate: runs the real agent against questions with
# known-good answers (CA public CS bachelor's = 7,679, …) to catch regressions
# when swapping models. Deliberately NOT part of PR CI because it needs two
# things GitHub-hosted runners don't have:
#   1. LLM_API_KEY (a paid secret), and
#   2. the real ~1.9 GB ipeds.db (the CI fixture has no real data).
#
# Trigger it by hand (Actions → this workflow → Run workflow) once you've added
# the LLM_API_KEY repo secret. To actually execute (not skip), run it on a
# runner that has ipeds.db present in the workspace root — e.g. pass a
# self-hosted runner label in the `runner` input, or add a step that fetches the
# db from R2. With no key or no db it exits green with an explanation.

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label (use a self-hosted label whose workspace has ipeds.db)"
        default: "ubuntu-latest"
        required: false

permissions:
  contents: read

jobs:
  nl2sql-eval:
    name: NL→SQL accuracy vs known answers
    runs-on: ${{ inputs.runner }}
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — secret + real db present?
        id: pre
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::notice::LLM_API_KEY not set — skipping the NL→SQL eval."
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ ! -f ipeds.db ]; then
            echo "::notice::ipeds.db not present on this runner — skipping (needs the real ~1.9 GB db)."
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.pre.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.pre.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.lock

      - name: Run NL→SQL eval
        if: steps.pre.outputs.run == 'true'
        run: python backend/tests/eval_nl2sql.py
