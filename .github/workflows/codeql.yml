name: CodeQL

# Static security analysis for the auth / SQL-execution surfaces (and the SPA).
# Free on public repositories; results appear under the Security tab. Runs on PRs
# and pushes to main, plus a weekly sweep for newly-published queries.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended: a superset of the default `security` suite (more
          # security queries), WITHOUT the `security-and-quality` suite's style/
          # maintainability queries (unnecessary-lambda, cyclic-import, import
          # style, etc.) — those are noise here; ruff already owns Python style.
          queries: security-extended
          # Excludes test code (not the deployed attack surface) — see paths-ignore.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
